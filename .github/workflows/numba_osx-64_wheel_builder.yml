name: numba_osx-64_wheel_builder

on:
  pull_request:
    paths:
    - .github/workflows/numba_osx-64_wheel_builder.yml
  workflow_dispatch:
    inputs:
      llvmlite_conda_runid:
        description: 'llvmlite conda workflow run ID for build(optional)'
        required: false
        type: string
      llvmlite_wheel_runid:
        description: 'llvmlite wheel workflow run ID for tests(optional)'
        required: false
        type: string

# Add concurrency control
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  LOCAL_LLVMLITE_ARTIFACT_PATH: llvmlite_conda
  CONDA_CHANNEL_NUMBA: numba/label/dev
  VALIDATION_PYTHON_VERSION: "3.12"
  ARTIFACT_RETENTION_DAYS: 7
  FALLBACK_LLVMLITE_VERSION: "15"

jobs:
  osx-64-build:
    name: osx-64-build-wheel (py ${{ matrix.python-version }}, np ${{ matrix.numpy_build }})
    runs-on: macos-13
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        include:
          - python-version: "3.10"
            numpy_build: "2.0.2"
          - python-version: "3.11"
            numpy_build: "2.0.2"
          - python-version: "3.12"
            numpy_build: "2.0.2"
          - python-version: "3.13"
            numpy_build: "2.1.3"
      fail-fast: false

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup platform-specific requirements
        run: |
            source ./buildscripts/github/setup_platform.sh "osx-64"

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.python-version }}
          conda-remove-defaults: true
          auto-update-conda: true
          auto-activate-base: true

      - name: Download llvmlite Artifact
        if: ${{ inputs.llvmlite_conda_runid != '' }}
        uses: actions/download-artifact@v4
        with:
          name: llvmlite-osx-64-py${{ matrix.python-version }}
          path: llvmlite_conda
          run-id: ${{ inputs.llvmlite_conda_runid }}
          repository: numba/llvmlite
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install build dependencies
        run: |
          set -x
          if [ "${{ inputs.llvmlite_conda_runid }}" != "" ]; then
              CHAN="file://${{ github.workspace }}/llvmlite_conda"
          else
              CHAN="${{ env.CONDA_CHANNEL_NUMBA }}"
          fi

          # Install llvmlite from the appropriate channel
          conda install -c "$CHAN" --yes llvmlite setuptools python-build numpy==${{ matrix.numpy_build }}

      - name: Configure OpenMP for macOS
        run: |
           # Install OpenMP via conda
           conda install --yes llvm-openmp

           # Set minimal compiler and linker flags for OpenMP
           echo "CFLAGS=-I$CONDA_PREFIX/include -Xclang -fopenmp" >> $GITHUB_ENV
           echo "CXXFLAGS=-I$CONDA_PREFIX/include -Xclang -fopenmp" >> $GITHUB_ENV
           echo "LDFLAGS=-L$CONDA_PREFIX/lib -lomp" >> $GITHUB_ENV

      - name: Select Xcode 14.1
        run: sudo xcode-select -s /Applications/Xcode_14.1.0.app

      - name: Build sdist [once - py3.10]
        if: matrix.python-version == '3.10'
        run: python -m build --sdist

      - name: Build wheel
        env:
          MACOSX_DEPLOYMENT_TARGET: "13.0"
        run: python -m build

      - name: Fix macOS wheel library paths
        run: |
          cd dist
          whl=$(stat -f "%m %N" ./*.whl | sort -n | tail -n 1 | cut -d' ' -f2-)
          echo "Processing wheel: $whl"

          # Unpack the wheel
          wheel unpack "$whl"

          # Get into the unpacked directory
          target_dir=$(echo "$whl" | cut -d "-" -f1 -f2)
          cd "$target_dir"

          # Find shared libraries
          so_files=$(find . -iname "*.so")
          echo "Found .so files:"
          echo "$so_files"

          for target_so in $so_files; do
            echo "Processing $target_so"
            echo "=== BEFORE ($target_so) ==="
            otool -L "$target_so" || echo "otool failed for $target_so "

            if otool -L "$target_so" | grep -q '@rpath/libc++.1.dylib'; then
                echo "Patching @rpath/libc++.1.dylib in $target_so"
                install_name_tool -change "@rpath/libc++.1.dylib" "/usr/lib/libc++.1.dylib" "$target_so"
            else
                echo "@rpath/libc++.1.dylib not found in $target_so"
            fi

            echo "=== AFTER ($target_so) ==="
            otool -L "$target_so" || echo "otool failed for $target_so "
          done

          echo "=== $target_dir contents ==="
          find . -ls
          echo "=== Write back to wheel ==="
          cd ..
          wheel pack "$target_dir"

          echo "=== Final wheel filename ==="
          ls -la ./*.whl

      - name: Upload numba wheel
        uses: actions/upload-artifact@v4
        with:
          name: numba-osx-64-py${{ matrix.python-version }}-np${{ matrix.numpy_build }}
          path: dist/*.whl
          compression-level: 0
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: error

      - name: Upload numba sdist
        if: matrix.python-version == '3.10'
        uses: actions/upload-artifact@v4
        with:
            name: numba-sdist
            path: dist/*.tar.gz
            compression-level: 0
            retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
            if-no-files-found: error

  osx-64-test:
    if: ${{ inputs.llvmlite_wheel_runid != '' }}
    name: osx-64-test-wheel (py ${{ matrix.python-version }}, np ${{ matrix.numpy_test }})
    needs: osx-64-build
    runs-on: macos-13
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        include:
          - python-version: "3.10"
            numpy_test: "2.0.2"
          - python-version: "3.11"
            numpy_test: "2.0.2"
          - python-version: "3.12"
            numpy_test: "2.0.2"
          - python-version: "3.13"
            numpy_test: "2.1.3"
      fail-fast: false

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download llvmlite wheel
        uses: actions/download-artifact@v4
        with:
          name: llvmlite-osx-64-py${{ matrix.python-version }}
          path: llvmlite_wheels
          run-id: ${{ inputs.llvmlite_wheel_runid }}
          repository: numba/llvmlite
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download numba wheel
        uses: actions/download-artifact@v4
        with:
          name: numba-osx-64-py${{ matrix.python-version }}-np${{ matrix.numpy_test }}
          path: dist

      - name: Install and test
        run: |
          # Get the Python executable path
          PYTHON_PATH=$(which python${{ matrix.python-version }})
          # Upgrade pip and install wheel
          $PYTHON_PATH -m pip install --upgrade pip wheel

          # Install dependencies
          $PYTHON_PATH -m pip install numpy==${{ matrix.numpy_test }}
          $PYTHON_PATH -m pip install llvmlite_wheels/*.whl
          $PYTHON_PATH -m pip install dist/*.whl

          # Run tests
          $PYTHON_PATH -m numba.runtests -j 1:100 -v -m

  osx-64-validate-wheel:
    name: osx-64-validate-wheel (py ${{ matrix.python-version }}, np ${{ matrix.numpy_build }})
    needs: osx-64-build
    runs-on: macos-13
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        include:
          - python-version: "3.10"
            numpy_build: "2.0.2"
          - python-version: "3.11"
            numpy_build: "2.0.2"
          - python-version: "3.12"
            numpy_build: "2.0.2"
          - python-version: "3.13"
            numpy_build: "2.1.3"
      fail-fast: false
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download Numba wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: numba-osx-64-py${{ matrix.python-version }}-np${{ matrix.numpy_build }}
          path: dist

      - name: Validate and smoke test wheel
        run: |
          python -m pip install --upgrade pip twine
          echo "--- Checking artifacts ---"
          ls -l dist
          echo "--- Running twine check (wheel) ---"
          python -m twine check dist/*.whl
          if [ "${{ matrix.python-version }}" == "3.10" ]; then
            echo "--- Running twine check (sdist) ---"
            python -m twine check dist/*.tar.gz
          fi
          echo "--- Installing wheel ---"
          NUMPY_VERSION="${{ matrix.numpy_build }}"
          python -m pip install --extra-index-url https://pypi.anaconda.org/numba/label/wheels/simple dist/numba*.whl numpy==$NUMPY_VERSION
          echo "--- Running numba -s ---"
          python -m numba -s
