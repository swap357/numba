name: numba_osx-64_wheel_builder

on:
  pull_request:
    paths:
    - .github/workflows/numba_osx-64_wheel_builder.yml
  workflow_dispatch:
    inputs:
      llvmlite_conda_runid:
        description: 'llvmlite conda workflow run ID for build(optional)'
        required: false
        type: string
      llvmlite_wheel_runid:
        description: 'llvmlite wheel workflow run ID for tests(optional)'
        required: false
        type: string

# Add concurrency control
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  LOCAL_LLVMLITE_ARTIFACT_PATH: llvmlite_conda
  CONDA_CHANNEL_NUMBA: numba/label/dev
  VALIDATION_PYTHON_VERSION: "3.12"
  ARTIFACT_RETENTION_DAYS: 7
  FALLBACK_LLVMLITE_VERSION: "15"

jobs:
  osx-64-build:
    name: osx-64-build-wheel (py ${{ matrix.python-version }}, np ${{ matrix.numpy_build }})
    runs-on: macos-13
    defaults:
      run:
        shell: bash -elx {0}
    strategy:
      matrix:
        include:
          - python-version: "3.10"
            numpy_build: "2.0.2"
          - python-version: "3.11"
            numpy_build: "2.0.2"
          - python-version: "3.12"
            numpy_build: "2.0.2"
          - python-version: "3.13"
            numpy_build: "2.1.3"
      fail-fast: false

    steps:
      - name: Clone repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup platform-specific requirements
        run: |
            source ./buildscripts/github/setup_platform.sh "osx-64"

      - name: Setup Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.python-version }}
          conda-remove-defaults: true
          auto-update-conda: true
          auto-activate-base: true

      - name: Download llvmlite Artifact
        if: ${{ inputs.llvmlite_conda_runid != '' }}
        uses: actions/download-artifact@v4
        with:
          name: llvmlite-osx-64-py${{ matrix.python-version }}
          path: llvmlite_conda
          run-id: ${{ inputs.llvmlite_conda_runid }}
          repository: numba/llvmlite
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install build dependencies
        run: |
          if [ "${{ inputs.llvmlite_conda_runid }}" != "" ]; then
              CHAN="file://${{ github.workspace }}/llvmlite_conda"
          else
              CHAN="${{ env.CONDA_CHANNEL_NUMBA }}"
          fi

          # Install llvmlite from the appropriate channel
          conda install -c "$CHAN" --yes llvmlite setuptools python-build numpy==${{ matrix.numpy_build }}

      - name: Configure OpenMP for macOS
        run: |
           conda install --yes llvm-openmp
           echo "CFLAGS=-I$CONDA_PREFIX/include -Xclang -fopenmp" >> $GITHUB_ENV
           echo "CXXFLAGS=-I$CONDA_PREFIX/include -Xclang -fopenmp" >> $GITHUB_ENV
           echo "LDFLAGS=-L$CONDA_PREFIX/lib -lomp" >> $GITHUB_ENV

      - name: Build sdist [once - py3.10]
        if: matrix.python-version == '3.10'
        run: python -m build --sdist

      - name: Build wheel
        run: python -m build

      - name: Fix macOS wheel library paths
        run: |
          cd dist
          curl https://gist.githubusercontent.com/sklam/15d98ca95047c68dc665affce6736ad1/raw/db5f7f9727918ca53599ea5ddccf0bda557e8153/patch_wheel_dylib.py > patch_wheel_dylib.py
          chmod +x patch_wheel_dylib.py
          python patch_wheel_dylib.py *.whl
          ls -la ./*.whl
          echo "--- Removing platform tag ---"
          python -m wheel tags --remove --platform-tag=macosx_10_15_x86_64 ./numba*.whl

      - name: Upload numba wheel
        uses: actions/upload-artifact@v4
        with:
          name: numba-osx-64-py${{ matrix.python-version }}-np${{ matrix.numpy_build }}
          path: dist/*.whl
          compression-level: 0
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: error

      - name: Upload numba sdist
        if: matrix.python-version == '3.10'
        uses: actions/upload-artifact@v4
        with:
            name: numba-sdist
            path: dist/*.tar.gz
            compression-level: 0
            retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
            if-no-files-found: error

  osx-64-test:
    if: ${{ inputs.llvmlite_wheel_runid != '' }}
    name: osx-64-test-wheel (py ${{ matrix.python-version }}, np ${{ matrix.numpy_test }})
    needs: osx-64-build
    runs-on: macos-13
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        include:
          - python-version: "3.10"
            numpy_test: "2.0.2"
          - python-version: "3.11"
            numpy_test: "2.0.2"
          - python-version: "3.12"
            numpy_test: "2.0.2"
          - python-version: "3.13"
            numpy_test: "2.1.3"
      fail-fast: false

    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download llvmlite wheel
        uses: actions/download-artifact@v4
        with:
          name: llvmlite-osx-64-py${{ matrix.python-version }}
          path: llvmlite_wheels
          run-id: ${{ inputs.llvmlite_wheel_runid }}
          repository: numba/llvmlite
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download numba wheel
        uses: actions/download-artifact@v4
        with:
          name: numba-osx-64-py${{ matrix.python-version }}-np${{ matrix.numpy_test }}
          path: dist

      - name: Install and test
        run: |
          # Get the Python executable path
          PYTHON_PATH=$(which python${{ matrix.python-version }})
          # Upgrade pip and install wheel
          $PYTHON_PATH -m pip install --upgrade pip wheel

          # Install dependencies
          $PYTHON_PATH -m pip install numpy==${{ matrix.numpy_test }}
          $PYTHON_PATH -m pip install llvmlite_wheels/*.whl
          $PYTHON_PATH -m pip install dist/*.whl

          # Run tests
          $PYTHON_PATH -m numba.runtests -j 1:100 -v -m

  osx-64-validate-wheel:
    name: osx-64-validate-wheel (py ${{ matrix.python-version }}, np ${{ matrix.numpy_build }})
    needs: osx-64-build
    runs-on: macos-13
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        include:
          - python-version: "3.10"
            numpy_build: "2.0.2"
          - python-version: "3.11"
            numpy_build: "2.0.2"
          - python-version: "3.12"
            numpy_build: "2.0.2"
          - python-version: "3.13"
            numpy_build: "2.1.3"
      fail-fast: false
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download Numba wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: numba-osx-64-py${{ matrix.python-version }}-np${{ matrix.numpy_build }}
          path: dist

      - name: Download llvmlite wheel
        uses: actions/download-artifact@v4
        with:
          name: llvmlite-osx-64-py${{ matrix.python-version }}
          path: llvmlite_wheels
          run-id: ${{ inputs.llvmlite_wheel_runid }}
          repository: numba/llvmlite
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate and smoke test wheel
        run: |
          # Get the Python executable path
          PYTHON_PATH=$(which python${{ matrix.python-version }})
          $PYTHON_PATH -m pip install --upgrade pip twine
          ls -l dist
          $PYTHON_PATH -m pip install llvmlite_wheels/*.whl
          $PYTHON_PATH -m twine check dist/*.whl
          NUMPY_VERSION="${{ matrix.numpy_build }}"
          $PYTHON_PATH -m pip install --extra-index-url https://pypi.anaconda.org/numba/label/wheels/simple dist/numba*.whl numpy==$NUMPY_VERSION
          $PYTHON_PATH -m numba -s

  osx-64-compare-dylibs:
    name: osx-64-compare-dylibs (py ${{ matrix.python-version }}, np ${{ matrix.numpy_build }})
    needs: osx-64-build
    runs-on: macos-13
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        # Use same matrix as build job
        include:
          - python-version: "3.10"
            numpy_build: "2.0.2"
          - python-version: "3.11"
            numpy_build: "2.0.2"
          - python-version: "3.12"
            numpy_build: "2.0.2"
          - python-version: "3.13"
            numpy_build: "2.1.3"
      fail-fast: false
    steps:
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download Built Numba wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: numba-osx-64-py${{ matrix.python-version }}-np${{ matrix.numpy_build }}
          path: built_wheel

      - name: Download Public Numba wheel and Unpack Both
        run: |
          python -m pip install --upgrade pip wheel
          echo "--- Downloading latest public Numba wheel for py${{ matrix.python-version }} ---"
          mkdir public_wheel
          # Attempt to download the wheel matching the built platform tag
          pip download numba --dest public_wheel --platform=macosx_10_15_x86_64 --python-version=${{ matrix.python-version }} --only-binary=:all: --no-deps
          if [ ! -f public_wheel/numba*.whl ]; then
            echo "WARNING: Could not download specific public wheel for py${{ matrix.python-version }}/macosx_10_15. Trying without platform tag."
            pip download numba --dest public_wheel --python-version=${{ matrix.python-version }} --implementation=cp --abi=cp${{ matrix.python-version }} --only-binary=:all: --no-deps
          fi
          if [ ! -f public_wheel/numba*.whl ]; then
            echo "ERROR: Failed to download public numba wheel for py${{ matrix.python-version }}. Cannot compare."
            exit 1
          fi
          ls -l public_wheel/
          
          echo "--- Unpacking wheels ---"
          mkdir unpacked_built unpacked_public
          wheel unpack built_wheel/*.whl --dest unpacked_built
          wheel unpack public_wheel/*.whl --dest unpacked_public
          echo "--- Unpacked contents (top level) ---"
          ls -l unpacked_built/
          ls -l unpacked_public/

      - name: Compare Wheel Structures
        run: |
          echo "--- Comparing unpacked wheel directory structures and files ---"
          # Find the top-level unpacked directories (handling version differences)
          built_dir=$(find unpacked_built -maxdepth 1 -type d -name 'numba*')
          public_dir=$(find unpacked_public -maxdepth 1 -type d -name 'numba*')
          
          if [ -z "$built_dir" ] || [ -z "$public_dir" ]; then
            echo "ERROR: Could not find unpacked directories inside unpacked_built/ or unpacked_public/."
            ls -l unpacked_built/ unpacked_public/
            exit 1
          fi
          
          echo "Comparing $built_dir vs $public_dir"
          # Use diff -qr to compare recursively and report only differences.
          # Add || true so the step doesn't fail if differences are found.
          diff -qr "$built_dir" "$public_dir" || true
          echo "Comparison finished."
