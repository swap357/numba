name: numba_win-arm64_wheel_builder

on:
  schedule:
    - cron: '30 8 * * 6'  # Saturday 8:30 AM UTC - win-arm64 wheel
  pull_request:
    paths:
      - .github/workflows/numba_win-arm64_wheel_builder.yml
      - buildscripts/github/evaluate.py
      - setup.py
  workflow_dispatch:
    inputs:
      llvmlite_wheel_runid:
        description: 'llvmlite wheel workflow run ID (optional)'
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

env:
  ARTIFACT_RETENTION_DAYS: 7
  WHEELS_INDEX_URL: https://pypi.anaconda.org/swap357/simple
  WIN_ARM64_CONDA_CHANNEL: bootstrap-win-arm64-round-2-native

jobs:
  load-matrix:
    runs-on: ubuntu-latest
    outputs:
      build-matrix-json: ${{ steps.load_matrix_json.outputs.build-matrix-json }}
      test-matrix-json: ${{ steps.load_matrix_json.outputs.test-matrix-json }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
      - id: load_matrix_json
        name: Load Workflow Matrix JSON
        env:
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          GITHUB_WORKFLOW_INPUT: ${{ toJson(github.event.inputs) }}
          GITHUB_PLATFORM: win-arm64
          GITHUB_PKG_TYPE: wheel
        run: |
          python buildscripts/github/evaluate.py

  win-arm64-build:
    name: win-arm64-build-wheel (py ${{ matrix.python_version_full }}, np ${{ matrix.numpy_build }})
    needs: load-matrix
    runs-on: windows-11-arm
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        include: ${{ fromJson(needs.load-matrix.outputs.build-matrix-json) }}
      fail-fast: false

    steps:
      - name: Clone repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0

      - name: Set up conda-standalone
        uses: conda-incubator/setup-conda-standalone@00a34805e93a8b640aee5f8a20e8f481ad77e3b4 # v0.1.0
        with:
          channel: ${{ env.WIN_ARM64_CONDA_CHANNEL }}
          conda-standalone-version: 26.3.2.post1
          destination-directory: ${{ runner.temp }}/conda-standalone

      - name: Download llvmlite wheel
        if: inputs.llvmlite_wheel_runid != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: llvmlite-win-arm64-py${{ matrix.python_major_minor }}
          path: llvmlite_wheels
          run-id: ${{ inputs.llvmlite_wheel_runid }}
          repository: swap357/llvmlite
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install build dependencies
        run: |
          export CONDA_PREFIX="${RUNNER_TEMP}/conda-build-env"
          "${CONDA_EXE}" create --prefix "${CONDA_PREFIX}" \
            -c "${WIN_ARM64_CONDA_CHANNEL}" -c m2-winarm64 -c main \
            --yes "python=${{ matrix.python_version_full }}" pip
          echo "CONDA_PREFIX=${CONDA_PREFIX}" >> "${GITHUB_ENV}"
          export PATH="${CONDA_PREFIX}/Scripts:${CONDA_PREFIX}/Library/bin:${CONDA_PREFIX}:${PATH}"
          echo "${CONDA_PREFIX}/Library/bin" >> "${GITHUB_PATH}"
          echo "${CONDA_PREFIX}" >> "${GITHUB_PATH}"
          echo "${CONDA_PREFIX}/Scripts" >> "${GITHUB_PATH}"
          if [ "${{ inputs.llvmlite_wheel_runid }}" != "" ]; then
            python -m pip install llvmlite_wheels/*.whl
          else
            python -m pip install -i ${{ env.WHEELS_INDEX_URL }} llvmlite
          fi
          python -m pip install build numpy==${{ matrix.numpy_build }} setuptools wheel tbb==2021.6 tbb-devel==2021.6

      - name: Build wheel
        run: python -m build --wheel --no-isolation

      - name: Upload numba wheel
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: numba_win-arm64_wheel_py${{ matrix.python_major_minor }}
          path: dist/*.whl
          compression-level: 0
          retention-days: ${{ env.ARTIFACT_RETENTION_DAYS }}
          if-no-files-found: error

  win-arm64-test:
    name: win-arm64-test-wheel (py ${{ matrix.python_version_full }}, np ${{ matrix.numpy_test }})
    needs: [load-matrix, win-arm64-build]
    runs-on: windows-11-arm
    defaults:
      run:
        shell: bash -el {0}
    strategy:
      matrix:
        include: ${{ fromJson(needs.load-matrix.outputs.test-matrix-json) }}
      fail-fast: false

    steps:
      - name: Set up conda-standalone
        uses: conda-incubator/setup-conda-standalone@00a34805e93a8b640aee5f8a20e8f481ad77e3b4 # v0.1.0
        with:
          channel: ${{ env.WIN_ARM64_CONDA_CHANNEL }}
          conda-standalone-version: 26.3.2.post1
          destination-directory: ${{ runner.temp }}/conda-standalone

      - name: Download Numba wheel artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: numba_win-arm64_wheel_py${{ matrix.python_major_minor }}
          path: dist

      - name: Download llvmlite wheel
        if: inputs.llvmlite_wheel_runid != ''
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: llvmlite-win-arm64-py${{ matrix.python_major_minor }}
          path: llvmlite_wheels
          run-id: ${{ inputs.llvmlite_wheel_runid }}
          repository: swap357/llvmlite
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install test dependencies
        run: |
          export CONDA_PREFIX="${RUNNER_TEMP}/conda-base"
          "${CONDA_EXE}" create --prefix "${CONDA_PREFIX}" \
            -c "${WIN_ARM64_CONDA_CHANNEL}" -c m2-winarm64 -c main \
            --yes "python=${{ matrix.python_version_full }}" pip wheel
          echo "CONDA_PREFIX=${CONDA_PREFIX}" >> "${GITHUB_ENV}"
          export PATH="${CONDA_PREFIX}/Scripts:${CONDA_PREFIX}/Library/bin:${CONDA_PREFIX}:${PATH}"
          echo "${CONDA_PREFIX}/Library/bin" >> "${GITHUB_PATH}"
          echo "${CONDA_PREFIX}" >> "${GITHUB_PATH}"
          echo "${CONDA_PREFIX}/Scripts" >> "${GITHUB_PATH}"

      - name: Validate and test wheel
        env:
          NUMBA_CPU_NAME: generic
          _NUMBA_REDUCED_TESTING: 1
        run: |
          python -m pip install --upgrade pip twine
          python -m pip install numpy==${{ matrix.numpy_test }} tbb==2021.6 tbb-devel==2021.6
          if [ "${{ inputs.llvmlite_wheel_runid }}" != "" ]; then
            python -m pip install llvmlite_wheels/*.whl
          else
            python -m pip install --pre -i ${{ env.WHEELS_INDEX_URL }} llvmlite
          fi
          python -m twine check dist/*.whl
          python -m pip install dist/*.whl

          python -m numba -s
          python -m numba.runtests -m 4 -v
